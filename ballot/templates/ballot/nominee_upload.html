{% extends "ballot/base.html" %}
{% block title %}Upload Photo | ATL’s Hottest{% endblock %}
{% block content %}
<section class="card narrow">
  <h1>Upload Photo</h1>
  <p>{{ nominee.name }} — {{ nominee.category.name }}</p>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn primary" type="submit">Upload</button>
  </form>
</section>
{% endblock %}
